topics:
  scan: /scan
  odom: /odom
  cmd_vel: /cmd_vel
  cmd_vel_type: TwistStamped

env:
  lidar_beams: 60
  lidar_max_range: 3.5
  control_hz: 10
  dt: 0.1
  max_steps: 600
  v_max: 0.22
  w_max: 2.0
  r_safe: 0.30

reward:
  time_penalty: -0.5

ppo:
  policy: MlpPolicy
  gamma: 0.99
  n_steps: 2048
  batch_size: 64
  learning_rate: 0.0003
  ent_coef: 0.0
  clip_range: 0.2
  verbose: 1

paths:
  model_path: ppo_results/ppo_model.zip
  log_dir: ppo_results/
